<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portal de Monitorias</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/frontend/index.css">
</head>

<body class="cadastro">

    <div id="titleCadastro">
        <h1>Portal de Monitorias</h1>
    </div>


    <form action="cadastro.html" method="post" class="formulario-cadastro">

        <div class="title-formulario">
            <h2>Cadastro</h2>
        </div>


        <div class="campo">
            <label for="matricula">Matrícula</label>

            <input
                type="text"
                id="matricula"
                name="matricula"
                placeholder="Digite sua matrícula"
                pattern="[0-9]+"
                title="A matrícula deve conter apenas números"
                inputmode="numeric"
                required
            >
        </div>


        <div class="campo">
            <label for="nomeCompleto">Nome completo</label>

            <input
                type="text"
                id="nomeCompleto"
                name="nomeCompleto"
                placeholder="Digite seu nome completo"
                pattern="[A-Za-zÀ-ÿ\s]+"
                title="O nome deve conter apenas letras e espaços"
                autocomplete="name"
                required
            >
        </div>


        <div class="campo">
            <label for="email">E-mail</label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="nome@exemplo.com"
                autocomplete="email"
                required
            >
        </div>


        <fieldset class="campo">
            <legend>Sexo</legend>

            <div class="opcoes-sexo">

                <label>
                    <input
                        type="radio"
                        name="sexo"
                        value="masculino"
                        required
                    >
                    Masculino
                </label>


                <label>
                    <input
                        type="radio"
                        name="sexo"
                        value="feminino"
                    >
                    Feminino
                </label>


                <label>
                    <input
                        type="radio"
                        name="sexo"
                        value="outro"
                    >
                    Outro
                </label>

            </div>
        </fieldset>


        <div class="campo">
            <label for="senha">Senha</label>

            <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="new-password"
                minlength="8"
                required
            >
        </div>


        <button type="submit">
            Cadastrar
        </button>

        
        <div class="login-link">
            <span>Já tem uma conta?</span>
            <a href="../login/login.html">Faça login</a>
        </div>
    
    </form>

</body>
</html>
